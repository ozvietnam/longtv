name: Deploy Web

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build static site (GitHub Pages)
        working-directory: web
        env:
          GITHUB_PAGES: "true"
        run: |
          npm ci
          npm run build
          test -f out/index.html
          test -f out/cam-nang/index.html

      - name: Prepare docs/ for GitHub Pages (main /docs)
        run: |
          rm -rf docs
          cp -r web/out docs
          touch docs/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/out
          force_orphan: true

      - name: Commit docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m "chore: deploy site to docs/ [skip ci]"
            git push
          fi
